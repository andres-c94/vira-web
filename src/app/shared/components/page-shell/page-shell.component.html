<div class="shell">
  <header class="topbar" *ngIf="!immersive()">
    <a class="brand" routerLink="/">
      <app-logo size="sm" [pulse]="true"></app-logo>
      <span>VIRA</span>
    </a>
    <nav class="nav" *ngIf="authService.isAuthenticated()">
      <a class="nav-link" routerLink="/dashboard" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">Hoy</a>
      <a class="nav-link desktop-link" routerLink="/programs" routerLinkActive="is-active">Programas</a>
      <a class="nav-link" routerLink="/progress" routerLinkActive="is-active">Progreso</a>
      <a class="nav-link desktop-link" routerLink="/actividad" routerLinkActive="is-active">Global</a>
      <a class="nav-link desktop-link" routerLink="/settings" routerLinkActive="is-active">Ajustes</a>
      <button type="button" class="logout nav-link desktop-link" (click)="logout()">Salir</button>
      <button
        type="button"
        class="menu-toggle"
        [attr.aria-expanded]="mobileMenuOpen"
        aria-label="Abrir menú"
        (click)="toggleMobileMenu()"
      >
        ☰
      </button>
    </nav>
    <nav class="mobile-menu" *ngIf="authService.isAuthenticated() && mobileMenuOpen">
      <a routerLink="/programs" routerLinkActive="is-active" (click)="closeMobileMenu()">Programas</a>
      <a routerLink="/actividad" routerLinkActive="is-active" (click)="closeMobileMenu()">Global</a>
      <a routerLink="/settings" routerLinkActive="is-active" (click)="closeMobileMenu()">Ajustes</a>
      <button type="button" class="menu-action" (click)="openSuggestions()">Sugerencias</button>
      <button type="button" class="logout" (click)="logout()">Salir</button>
    </nav>
  </header>

  <main class="content" [class.compact]="compact()" [class.immersive]="immersive()">
    <ng-content></ng-content>
  </main>

  <nav class="bottom-nav" *ngIf="!immersive() && authService.isAuthenticated()">
    <a routerLink="/dashboard" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }" aria-label="Hoy" title="Hoy">
      <svg class="bottom-nav__icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 10.5 12 4l8 6.5V20a1 1 0 0 1-1 1h-4.5v-5.5h-5V21H5a1 1 0 0 1-1-1z" />
      </svg>
      <span class="bottom-nav__label">Hoy</span>
    </a>
    <a routerLink="/programs" routerLinkActive="is-active" aria-label="Programas" title="Programas">
      <svg class="bottom-nav__icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M5 5h6v6H5zM13 5h6v6h-6zM5 13h6v6H5zM13 13h6v6h-6z" />
      </svg>
      <span class="bottom-nav__label">Programas</span>
    </a>
    <a routerLink="/progress" routerLinkActive="is-active" aria-label="Progreso" title="Progreso">
      <svg class="bottom-nav__icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M5 19h14v2H5zM7 16V9h2v7zm4 0V5h2v11zm4 0v-4h2v4z" />
      </svg>
      <span class="bottom-nav__label">Progreso</span>
    </a>
    <a routerLink="/actividad" routerLinkActive="is-active" aria-label="Global" title="Global">
      <svg class="bottom-nav__icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 3a9 9 0 1 0 0 18 9 9 0 0 0 0-18Zm0 0c2.2 2 3.5 5 3.5 9s-1.3 7-3.5 9m0-18C9.8 5 8.5 8 8.5 12s1.3 7 3.5 9m-8-9h16M4.8 8h14.4M4.8 16h14.4" />
      </svg>
      <span class="bottom-nav__label">Global</span>
    </a>
    <a routerLink="/settings" routerLinkActive="is-active" aria-label="Ajustes" title="Ajustes">
      <svg class="bottom-nav__icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 3.75v2.1m0 12.3v2.1M5.46 5.46l1.48 1.48m10.12 10.12 1.48 1.48M3.75 12h2.1m12.3 0h2.1M5.46 18.54l1.48-1.48m10.12-10.12 1.48-1.48M12 8.25a3.75 3.75 0 1 1 0 7.5a3.75 3.75 0 0 1 0-7.5Z" />
      </svg>
      <span class="bottom-nav__label">Ajustes</span>
    </a>
  </nav>

  <app-suggestion-modal></app-suggestion-modal>
</div>
